version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: fashion-ecommerce-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fashion_ecommerce
      MYSQL_USER: fashionuser
      MYSQL_PASSWORD: fashionpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - fashion-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fashion-ecommerce-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fashion_ecommerce
      SPRING_DATASOURCE_USERNAME: fashionuser
      SPRING_DATASOURCE_PASSWORD: fashionpass
      JWT_SECRET: mySecretKeyForJWTTokenGenerationChangeThisInProduction123456789012345
      FILE_UPLOAD_DIR: /app/uploads
      FILE_BASE_URL: http://localhost:8080/api/v1/files
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fashion-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion-ecommerce-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fashion-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  fashion-network:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:

